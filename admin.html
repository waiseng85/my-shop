<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>味香园 · 后台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--red:#C8352A;--gold:#D4920A;--green:#2E7D32;--blue:#1565C0;--bg:#F4F6F9;--card:#FFFFFF;--text:#1C1C1E;--text2:#6B7280;--border:#E5E7EB;--shadow:rgba(0,0,0,0.06);--sidebar:#1C1410;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);}
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#1C1410,#3D2B20);}
.login-box{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--red),#8B1A12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-size:28px;color:#fff;font-weight:700;margin:0 auto 12px;box-shadow:0 4px 16px rgba(200,53,42,0.4);}
.login-logo h2{font-family:'Noto Serif SC',serif;font-size:20px;color:var(--text);margin-bottom:4px;}
.login-logo p{font-size:12px;color:var(--text2);}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500;}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Noto Sans SC',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;background:#fff;}
.form-input:focus{border-color:var(--red);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--red),#E8453A);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;margin-top:6px;box-shadow:0 4px 14px rgba(200,53,42,0.4);}
.login-hint{text-align:center;font-size:11px;color:var(--text2);margin-top:14px;}
#adminPage{display:none;min-height:100vh;}
.admin-wrap{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--sidebar);color:#fff;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform 0.3s;}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-logo-icon{width:40px;height:40px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-size:18px;color:#fff;font-weight:700;margin-bottom:10px;}
.sidebar-logo h2{font-family:'Noto Serif SC',serif;font-size:15px;color:#fff;margin-bottom:2px;}
.sidebar-logo p{font-size:10px;color:rgba(255,255,255,0.45);}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-section{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;transition:all 0.2s;font-size:13px;color:rgba(255,255,255,0.6);border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:rgba(200,53,42,0.2);color:#fff;border-left-color:var(--red);}
.nav-item svg{width:17px;height:17px;flex-shrink:0;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);}
.logout-btn{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:11px;margin-top:10px;width:100%;text-align:left;padding:0;font-family:'Noto Sans SC',sans-serif;}
.logout-btn:hover{color:#fff;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
.sidebar-overlay.show{display:block;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main-content{margin-left:0!important;}}
.main-content{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px var(--shadow);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.menu-toggle{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;color:var(--text2);}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);}
.content{padding:20px 24px;flex:1;}
@media(max-width:600px){.content{padding:14px 14px;}}
.section{display:none;}
.section.active{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px;}
.stat-num{font-size:22px;font-weight:700;color:var(--text);font-family:'Noto Serif SC',serif;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--text2);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.btn-add{background:var(--red);color:#fff;border:none;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;gap:6px;box-shadow:0 3px 10px rgba(200,53,42,0.3);}
.search-bar2{background:#fff;border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;padding:8px 13px;gap:8px;flex:1;max-width:260px;}
.search-bar2 input{border:none;background:transparent;font-size:13px;color:var(--text);width:100%;outline:none;font-family:'Noto Sans SC',sans-serif;}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:600px){.products-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.products-grid{grid-template-columns:repeat(4,1fr);}}
.prod-card{background:#fff;border-radius:13px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);transition:transform 0.2s;animation:fadeIn 0.3s ease both;}
.prod-card:hover{transform:translateY(-2px);}
.prod-img{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;}
.prod-status{position:absolute;top:7px;right:7px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;}
.prod-on{background:#E8F5E9;color:var(--green);}
.prod-off{background:#FFEBEE;color:var(--red);}
.prod-info{padding:10px;}
.prod-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.4;}
.prod-cat{font-size:10px;color:var(--text2);margin-bottom:5px;}
.prod-price{font-size:14px;font-weight:700;color:var(--red);margin-bottom:8px;}
.prod-actions{display:flex;gap:6px;}
.btn-edit{flex:1;padding:6px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.btn-del{padding:6px 10px;background:#FFEBEE;color:var(--red);border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;}}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px;}
@media(min-width:600px){.modal{border-radius:20px;margin:20px;}}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);line-height:1;}
.img-upload{width:100%;height:130px;border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:14px;position:relative;overflow:hidden;}
.img-upload:hover{border-color:var(--red);}
.img-upload-preview{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.img-upload-text{font-size:12px;color:var(--text2);text-align:center;z-index:1;display:flex;flex-direction:column;align-items:center;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--text);outline:none;background:#fff;}
.form-select:focus{border-color:var(--red);}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.toggle-label{font-size:13px;font-weight:500;color:var(--text);}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;cursor:pointer;position:relative;transition:background 0.2s;}
.toggle.on{background:var(--green);}
.toggle-dot{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle.on .toggle-dot{left:23px;}
.btn-save{width:100%;padding:13px;background:linear-gradient(135deg,var(--red),#E8453A);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;margin-top:6px;box-shadow:0 4px 12px rgba(200,53,42,0.35);}
.btn-save:disabled{opacity:0.6;}
.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px;}
.empty-state{text-align:center;padding:40px;color:var(--text2);font-size:13px;background:#fff;border-radius:14px;border:1px solid var(--border);grid-column:1/-1;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1C1410;color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.settings-section{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:14px;}
.settings-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">味</div>
      <h2>味香园后台管理</h2>
      <p>Admin Dashboard · 请登录</p>
    </div>
    <div class="form-group"><label class="form-label">账号</label><input class="form-input" id="adminUser" type="text" placeholder="admin"></div>
    <div class="form-group"><label class="form-label">密码</label><input class="form-input" id="adminPass" type="password" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doAdminLogin()">登录后台</button>
    <div class="login-hint">默认账号：admin　密码：123456</div>
  </div>
</div>

<div id="adminPage">
  <div class="admin-wrap">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">味</div>
        <h2>味香园</h2>
        <p>后台管理系统</p>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">主菜单</div>
        <div class="nav-item active" onclick="showSection('dashboard',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>数据总览
        </div>
        <div class="nav-item" onclick="showSection('products',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>商品管理
        </div>
        <div class="nav-section">系统</div>
        <div class="nav-item" onclick="showSection('orders',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>订单管理
        </div>
        <div class="nav-item" onclick="showSection('shop',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>店铺设置
        </div>
        <div class="nav-item" onclick="showSection('settings',this)">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>系统设置
        </div>
        <div class="nav-item" onclick="window.open('https://waiseng85.github.io/my-shop','_blank')">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>查看前台
        </div>
      </nav>
      <div class="sidebar-footer">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;">A</div>
          <div><div style="font-size:12px;color:#fff;font-weight:600;">管理员</div><div style="font-size:10px;color:rgba(255,255,255,0.4);">⚡ 已连接数据库</div></div>
        </div>
        <button class="logout-btn" onclick="doLogout()">⬡ 退出登录</button>
      </div>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="main-content">
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" onclick="toggleSidebar()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="topbar-title" id="topbarTitle">数据总览</div>
        </div>
      </div>

      <div class="content">

        <div class="section active" id="sec-dashboard">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon" style="background:#FFF3E0;">📦</div><div class="stat-num" id="stat-products">-</div><div class="stat-label">商品总数</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#E8F5E9;">✅</div><div class="stat-num" id="stat-active">-</div><div class="stat-label">上架中</div></div>
            <div class="stat-card"><div class="stat-icon" style="background:#FCE4EC;">📴</div><div class="stat-num" id="stat-inactive">-</div><div class="stat-label">已下架</div></div>
          </div>
          <div style="background:#fff;border-radius:14px;padding:18px;border:1px solid var(--border);">
            <div style="font-size:14px;font-weight:700;margin-bottom:14px;">📋 最新商品</div>
            <div id="dashProducts"><div class="loading">加载中...</div></div>
          </div>
          <div style="background:#fff;border-radius:14px;padding:18px;border:1px solid var(--border);margin-top:14px;">
            <div style="font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
              📋 最新订单
              <button onclick="showSection('orders',document.querySelector('.nav-item:nth-child(3)'))" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:600;">查看全部 →</button>
            </div>
            <div id="dashOrders"><div style="text-align:center;padding:20px;color:var(--text2);font-size:13px;">暂无订单</div></div>
          </div>
        </div>

        <div class="section" id="sec-products">
          <div class="section-header">
            <div class="search-bar2">
              <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" placeholder="搜索商品…" oninput="filterProducts(this.value)">
            </div>
            <button class="btn-add" onclick="openAddProduct()">＋ 添加商品</button>
          </div>
          <div class="products-grid" id="productsGrid"><div class="loading" style="grid-column:1/-1;">加载中...</div></div>
        </div>

        <!-- ORDERS -->
        <div class="section" id="sec-orders">
          <div class="section-header">
            <div style="font-size:13px;color:var(--text2);">共 <span id="orderCount">0</span> 笔订单</div>
            <div style="display:flex;gap:8px;">
              <select id="orderFilter" onchange="filterOrders(this.value)" style="border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Noto Sans SC',sans-serif;background:#fff;outline:none;">
                <option value="all">全部订单</option>
                <option value="0">⏳ 待付款</option>
                <option value="1">✅ 已付款</option>
                <option value="2">🚚 已发货</option>
                <option value="3">📦 已到货</option>
              </select>
            </div>
          </div>
          <div class="gap-stack" id="ordersList">
            <div class="empty" style="text-align:center;padding:40px;color:var(--text2);font-size:13px;background:#fff;border-radius:14px;border:1px solid var(--border);">暂无订单记录</div>
          </div>
        </div>

        <!-- SHOP SETTINGS -->
        <div class="section" id="sec-shop">
          <div class="settings-section">
            <div class="settings-title">🏪 店铺外观设置</div>
            
            <!-- Logo Upload -->
            <div class="form-group">
              <label class="form-label">店铺 Logo</label>
              <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
                <div id="logoPreviewWrap" style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#C8352A,#8B1A12);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700;font-family:'Noto Serif SC',serif;overflow:hidden;flex-shrink:0;">
                  <span id="logoText">味</span>
                  <img id="logoImgPreview" style="display:none;width:100%;height:100%;object-fit:cover;">
                </div>
                <div style="flex:1;">
                  <button onclick="document.getElementById('logoFileInput').click()" class="btn-save" style="padding:9px;font-size:12px;margin:0 0 6px 0;background:var(--blue);">📷 上传 Logo 图片</button>
                  <div style="font-size:10px;color:var(--text2);">建议正方形图片，支持 JPG/PNG</div>
                </div>
              </div>
              <input type="file" id="logoFileInput" accept="image/*" style="display:none;" onchange="previewLogo(this)">
            </div>

            <!-- Shop Name -->
            <div class="form-group">
              <label class="form-label">店铺名称（中文）</label>
              <input class="form-input" id="shopNameCN" placeholder="味香园" value="">
            </div>
            <div class="form-group">
              <label class="form-label">店铺名称（英文）</label>

async function loadProducts() {
  try {
    const { data, error } = await db.from(TABLE).select('*').order('created_at',{ascending:false});

function getCatName(cat) {
  const m={pastry:'饼干糕点',drinks:'即冲饮品',sauce:'麻油/酱料',snack:'零食小吃',gift:'礼盒套装',promo:'促销',new:'新品'};
  return m[cat]||cat||'';
}

function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  if(!list||list.length===0){grid.innerHTML='<div class="empty-state">还没有商品，点「添加商品」开始！</div>';return;}
  grid.innerHTML = list.map((p,i)=>`
    <div class="prod-card" style="animation-delay:${i*0.04}s">
      <div class="prod-img" style="background:${BKGS[i%BKGS.length]}">

        <div class="prod-cat">${getCatName(p.cat)}${p.tag?' · '+p.tag:''}</div>

        </div>

function filterProducts(v) {
  renderProducts(v?allProducts.filter(p=>(p.name||'').includes(v)||(p.name2||'').includes(v)):allProducts);

function updateDashboard() {
  document.getElementById('stat-products').textContent = allProducts.length;

function openEditProduct(id) {
  const p=allProducts.find(x=>x.id==id);if(!p)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='编辑商品';
  document.getElementById('pName').value=p.name||'';
  document.getElementById('pName2').value=p.name2||'';
  document.getElementById('pPrice').value=p.price||'';
  document.getElementById('pOldPrice').value=p.old_price||'';
  document.getElementById('pCat').value=p.cat||'pastry';
  document.getElementById('pTag').value=p.tag||'';
  if(p.is_active)document.getElementById('pStatusToggle').classList.add('on');
  else document.getElementById('pStatusToggle').classList.remove('on');
  if(p.img){document.getElementById('imgPreview').src=p.img;document.getElementById('imgPreview').style.display='block';document.getElementById('imgUploadText').style.display='none';}
  else{document.getElementById('imgPreview').style.display='none';document.getElementById('imgUploadText').style.display='flex';}
  document.getElementById('productModal').classList.add('show');
}

async function saveProduct() {
  const name=document.getElementById('pName').value.trim();
  const price=parseFloat(document.getElementById('pPrice').value);
  if(!name||isNaN(price)){showToast('请填写商品名称和价格！');return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent='保存中...';btn.disabled=true;
  const imgEl=document.getElementById('imgPreview');
  const data={
    name,name2:document.getElementById('pName2').value.trim(),price,
    old_price:parseFloat(document.getElementById('pOldPrice').value)||null,
    cat:document.getElementById('pCat').value,tag:document.getElementById('pTag').value,
    is_active:document.getElementById('pStatusToggle').classList.contains('on'),
    img:(imgEl.style.display!=='none'&&imgEl.src)?imgEl.src:null,
  };
  try {
    let error;
    if(editingId){({error}=await db.from(TABLE).update(data).eq('id',editingId));}
    else{({error}=await db.from(TABLE).insert(data));}
    if(error)throw error;
    showToast(editingId?'商品已更新！✅':'添加成功！✅');
    closeModal();await loadProducts();
  } catch(e){showToast('保存失败: '+e.message);}
  finally{btn.textContent='保存商品';btn.disabled=false;}
}

async function deleteProduct(id) {
  if(!confirm('确定删除这个商品吗？'))return;
  try{
    const{error}=await db.from(TABLE).delete().eq('id',id);
    if(error)throw error;
    showToast('已删除');await loadProducts();
  }catch(e){showToast('删除失败: '+e.message);}
}

function previewImage(input){
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=e=>{const img=document.getElementById('imgPreview');img.src=e.target.result;img.style.display='block';document.getElementById('imgUploadText').style.display='none';};
  reader.readAsDataURL(input.files[0]);
}

async function aiTranslate() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { showToast('请先填写商品名称！'); return; }
  
  const btn = document.getElementById('translateBtn');
  btn.textContent = '⏳ 翻译中...';
  btn.disabled = true;

  try {
    // Use Google Translate free API
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=en&dt=t&q=${encodeURIComponent(name)}`;
    const response = await fetch(url);
    const data = await response.json();
    const translated = data[0].map(item => item[0]).join('').trim();
    document.getElementById('pName2').value = translated;
    showToast('翻译成功！✅');
  } catch(e) {
    // Fallback: open Google Translate in new tab
    showToast('请稍等，正在打开翻译...');
    window.open(`https://translate.google.com/?sl=zh-CN&tl=en&text=${encodeURIComponent(name)}&op=translate`, '_blank');
  }

  btn.textContent = '🤖 AI翻译';
  btn.disabled = false;
}

// ===== SHOP SETTINGS =====
function loadShopSettings() {
  const s = JSON.parse(localStorage.getItem('shopSettings') || '{}');
  if (s.nameCN) document.getElementById('shopNameCN').value = s.nameCN;
  if (s.nameEN) document.getElementById('shopNameEN').value = s.nameEN;
  if (s.letter) document.getElementById('logoLetter').value = s.letter;
  if (s.bannerCN) document.getElementById('bannerTitleCN').value = s.bannerCN;
  if (s.bannerEN) document.getElementById('bannerTitleEN').value = s.bannerEN;
  if (s.logo) {
    document.getElementById('logoImgPreview').src = s.logo;
    document.getElementById('logoImgPreview').style.display = 'block';
    document.getElementById('logoText').style.display = 'none';
    document.getElementById('previewLogoImg').src = s.logo;
    document.getElementById('previewLogoImg').style.display = 'block';
    document.getElementById('previewLogoText').style.display = 'none';
  }
  if (s.nameCN) document.getElementById('previewName').textContent = s.nameCN;
  if (s.letter) {
    document.getElementById('previewLogoText').textContent = s.letter;
    document.getElementById('logoText').textContent = s.letter;
  }
  if (s.color) applyColor(s.color);
}

function previewLogo(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const src = e.target.result;
    document.getElementById('logoImgPreview').src = src;
    document.getElementById('logoImgPreview').style.display = 'block';
    document.getElementById('logoText').style.display = 'none';
    document.getElementById('previewLogoImg').src = src;
    document.getElementById('previewLogoImg').style.display = 'block';
    document.getElementById('previewLogoText').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function selectColor(color, el) {
  document.querySelectorAll('[onclick^="selectColor"]').forEach(e => e.style.border = '3px solid transparent');
  el.style.border = '3px solid #fff';
  applyColor(color);
}

function applyColor(color) {
  document.documentElement.style.setProperty('--red', color);
  document.getElementById('logoPreviewWrap').style.background = `linear-gradient(135deg,${color},${color}aa)`;
  document.getElementById('previewLogo').style.background = `linear-gradient(135deg,${color},${color}aa)`;
  document.getElementById('previewName').style.color = color;
}

// Live preview update
document.addEventListener('input', e => {
  if (e.target.id === 'shopNameCN') document.getElementById('previewName').textContent = e.target.value || '味香园';
  if (e.target.id === 'logoLetter') {
    const letter = e.target.value || '味';
    document.getElementById('previewLogoText').textContent = letter;
    document.getElementById('logoText').textContent = letter;
  }
});

function saveShopSettings() {
  const s = {
    nameCN: document.getElementById('shopNameCN').value || '味香园',
    nameEN: document.getElementById('shopNameEN').value || '',
    letter: document.getElementById('logoLetter').value || '味',
    bannerCN: document.getElementById('bannerTitleCN').value || '',
    bannerEN: document.getElementById('bannerTitleEN').value || '',
    logo: document.getElementById('logoImgPreview').src || '',
    color: getComputedStyle(document.documentElement).getPropertyValue('--red').trim(),
  };
  localStorage.setItem('shopSettings', JSON.stringify(s));
  showToast('店铺设置已保存！✅ 刷新前台即可看到效果');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')doAdminLogin();});
</script>
